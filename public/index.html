    // ============================================================
    // ж ёеҝғеҠҹиғҪпјҡжӯҢиҜҚгҖҒжҗңзҙўгҖҒж’ӯж”ҫ

    // ========== е·Ҙе…·еҮҪж•° ==========
    function decodeHTML(html) {
      if (!html) return '';
      const txt = document.createElement("textarea");
      txt.innerHTML = html;
      return txt.value;
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return '00:00';
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function artworkShort2Long(albumpicShort) {
      if (!albumpicShort) return undefined;
      const idx = albumpicShort.indexOf("/");
      return idx !== -1 ? `https://img4.kuwo.cn/star/albumcover/1080${albumpicShort.slice(idx)}` : undefined;
    }

    function getDefaultCover() {
      const canvas = document.createElement('canvas');
      canvas.width = 100;
      canvas.height = 100;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 100, 100);
      grad.addColorStop(0, '#7c3aed');
      grad.addColorStop(1, '#6d28d9');
      ctx.fillStyle = grad;
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(0, 0, 100, 100, 12);
      } else {
        ctx.rect(0, 0, 100, 100);
      }
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = '48px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('рҹҺө', 50, 52);
      return canvas.toDataURL('image/png');
    }
    const DEFAULT_COVER = getDefaultCover();

    function getProxyUrl(url) {
      const proxyBase = localStorage.getItem('music_cors_proxy') || 'https://jsnzkpg4.pages.dev/';
      const cleanProxy = proxyBase.endsWith('/') ? proxyBase : proxyBase + '/';
      return `${cleanProxy}${url}`;
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { credentials: 'same-origin', ...options, headers: { 'content-type': 'application/json', ...(options.headers || {}) } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'иҜ·жұӮеӨұиҙҘ');
      return data;
    }
    function requireLogin() {
      if (currentUser) return true;
      openAuthModal();
      return false;
    }
    async function loadFavorites() {
      if (!currentUser) { favorites = []; return; }
      const data = await apiFetch('/api/favorites');
      favorites = data.favorites || [];
    }
    function isFavorite(songId) { return favorites.some(song => String(song.id) === String(songId)); }
    async function toggleFavorite(song) {
      if (!requireLogin()) return;
      const exists = isFavorite(song.id);
      if (exists) await apiFetch(`/api/favorites/${encodeURIComponent(song.id)}`, { method: 'DELETE' });
      else await apiFetch('/api/favorites', { method: 'POST', body: JSON.stringify(song) });
      await loadFavorites();
      if (currentView === 'favorites') {
        playlist = [...favorites];
        currentIndex = currentSongId ? playlist.findIndex(item => String(item.id) === String(currentSongId)) : -1;
        listTitle.innerText = `ж”¶и—ҸжӯҢеҚ• (${favorites.length})`;
      }
      renderPlaylist();
    }
    async function showFavorites() {
      if (!requireLogin()) return;
      await loadFavorites();
      currentView = 'favorites'; playlist = [...favorites];
      currentIndex = currentSongId ? playlist.findIndex(song => String(song.id) === String(currentSongId)) : -1;
      listTitle.innerText = `ж”¶и—ҸжӯҢеҚ• (${favorites.length})`;
      backToSearchBtn.classList.remove('hidden'); collectionPlayControls.classList.remove('hidden'); collectionPlayControls.classList.add('flex');
      pageIndicator.classList.add('hidden'); pagination.classList.add('hidden'); renderPlaylist();
    }
    function showSearchResults() {
      currentView = 'search'; activeCustomPlaylist=null; listTitle.innerText = 'жӯҢжӣІеҲ—иЎЁ'; backToSearchBtn.classList.add('hidden');
      collectionPlayControls.classList.add('hidden'); collectionPlayControls.classList.remove('flex'); pageIndicator.classList.remove('hidden');
      if (currentQuery) loadSearchList(); else musicList.innerHTML = '<div class="text-center text-slate-500 py-12 text-sm">иҫ“е…ҘжӯҢжӣІеҗҚејҖе§Ӣжҗңзҙўеҗ§ вңЁ</div>';
    }
    function buildPlayUrl(song) {
      const QUALITY_MAP = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' };
      const level = QUALITY_MAP[qualitySelect.value] || 'standard';
      const template = selectedSource?.url_template || 'https://music.nxinxz.com/kw.php?id={id}&level={level}&type={type}';
      return template.replaceAll('{id}', encodeURIComponent(song.id)).replaceAll('{level}', encodeURIComponent(level)).replaceAll('{type}', 'mp3');
    }
    async function loadSources() {
      if (!currentUser) { musicSources=[]; selectedSource=null; renderSources(); return; }
      const data=await apiFetch('/api/sources'); musicSources=data.sources||[]; selectedSource=musicSources.find(x=>x.is_selected)||musicSources[0]||null; renderSources();
    }
    function renderSources() {
      if (!currentUser) { sourceList.innerHTML='<div class="text-xs text-slate-500">иҜ·е…Ҳзҷ»еҪ•</div>'; return; }

    }

    // ========== дё»йўҳеҲҮжҚў ==========
    function setTheme(isDark) {
      const html = document.documentElement;
      if (isDark) {
        html.classList.add('dark');
        html.classList.remove('light');
        sunPath.classList.remove('hidden');
        moonPath.classList.add('hidden');
      } else {
        html.classList.remove('dark');
        html.classList.add('light');
        sunPath.classList.add('hidden');
        moonPath.classList.remove('hidden');
      }
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      setTheme(!isDark);
    }
    themeToggle.onclick = toggleTheme;

    function initTheme() {
      const saved = localStorage.getItem('theme');
      setTheme(saved !== 'light');
    }

    async function loadCustomPlaylists() {
      if (!currentUser) { customPlaylists=[]; return; }
      const data=await apiFetch('/api/playlists'); customPlaylists=data.playlists||[];
    }
    function renderPlaylistManager() {
      if (!currentUser) { playlistManagerList.innerHTML='<div class="text-xs text-slate-500">иҜ·е…Ҳзҷ»еҪ•</div>'; return; }
      if (!customPlaylists.length) { playlistManagerList.innerHTML='<div class="text-center text-xs text-slate-500 py-5">иҝҳжІЎжңүиҮӘе®ҡд№үжӯҢеҚ•</div>'; return; }
      playlistManagerList.innerHTML=customPlaylists.map(pl=>`<div class="flex items-center gap-2 p-3 bg-slate-950/50 border border-slate-800 rounded-xl">
        <button data-open-playlist="${pl.id}" class="min-w-0 flex-1 text-left"><div class="text-sm font-semibold truncate">${escapeHTML(pl.name)}</div><div class="text-[10px] text-slate-500 truncate">${escapeHTML(pl.description||'жҡӮж— з®Җд»Ӣ')} В· ${pl.song_count||0} йҰ–</div></button>
        <button data-edit-playlist="${pl.id}" class="text-[10px] px-2 py-1 bg-slate-800 rounded text-brand-400">зј–иҫ‘</button>
        <button data-delete-playlist="${pl.id}" class="text-[10px] px-2 py-1 bg-slate-800 rounded text-red-400">еҲ йҷӨ</button>
      </div>`).join('');
    }
    function escapeHTML(v='') { const d=document.createElement('div'); d.textContent=String(v); return d.innerHTML; }
    async function openPlaylistManager() { if(!requireLogin())return; await loadCustomPlaylists(); renderPlaylistManager(); playlistManagerModal.classList.remove('hidden'); }
    async function showCustomPlaylist(id) {
      if(!requireLogin())return; const data=await apiFetch(`/api/playlists/${encodeURIComponent(id)}/songs`);
      activeCustomPlaylist=data.playlist; playlist=data.songs||[]; currentView='custom'; currentIndex=currentSongId?playlist.findIndex(x=>String(x.id)===String(currentSongId)):-1;
      listTitle.innerText=`${activeCustomPlaylist.name} (${playlist.length})`; backToSearchBtn.classList.remove('hidden'); collectionPlayControls.classList.remove('hidden'); collectionPlayControls.classList.add('flex'); pageIndicator.classList.add('hidden'); pagination.classList.add('hidden'); playlistManagerModal.classList.add('hidden'); renderPlaylist();
    }
    async function openAddToPlaylist(song) {
      if(!requireLogin())return; pendingPlaylistSong=song; await loadCustomPlaylists();
      addToPlaylistList.innerHTML=customPlaylists.length?customPlaylists.map(pl=>`<button data-add-to-playlist="${pl.id}" class="w-full text-left p-3 bg-slate-950 border border-slate-800 rounded-xl hover:border-brand-500"><div class="text-sm font-semibold">${escapeHTML(pl.name)}</div><div class="text-[10px] text-slate-500">${pl.song_count||0} йҰ–</div></button>`).join(''):'<div class="text-xs text-slate-500 text-center py-4">иҜ·е…ҲеҲӣе»әжӯҢеҚ•</div>';
      addToPlaylistModal.classList.remove('hidden');
    }

    // ========== API ==========
    async function searchMusic(query, page) {
      const url = `http://search.kuwo.cn/r.s?client=kt&all=${encodeURIComponent(query)}&pn=${page - 1}&rn=30&uid=2574109560&ver=kwplayer_ar_8.5.4.2&vipver=1&ft=music&cluster=0&strategy=2012&encoding=utf8&rformat=json&vermerge=1&mobi=1`;
      const response = await fetch(getProxyUrl(url));
      let text = await response.text();
      if (text.startsWith('callback(') || text.startsWith('jsonp(')) {
        text = text.substring(text.indexOf('(') + 1, text.lastIndexOf(')'));
      }
      let res;
      try { res = JSON.parse(text); } catch(e) { res = eval('(' + text + ')'); }
      const songs = res.abslist.map(_ => ({
        // еӯҳеӮЁзәҜж•°еӯ— IDпјҲеҺ»жҺү MUSIC_ еүҚзјҖпјү
        id: _.MUSICRID.replace("MUSIC_", ""),
        artwork: artworkShort2Long(_.web_albumpic_short),
        title: decodeHTML(_.NAME || ""),
        artist: decodeHTML(_.ARTIST || ""),
        album: decodeHTML(_.ALBUM || ""),
      }));
      return { isEnd: (+res.PN + 1) * +res.RN >= +res.TOTAL, data: songs };
    }

    // ========== гҖҗж ёеҝғдҝ®еӨҚгҖ‘жӯҢиҜҚиҺ·еҸ– - зӣҙжҺҘдј зәҜж•°еӯ— ID ==========
    async function fetchLyrics(songId) {
      // songId жҳҜзәҜж•°еӯ—пјҢзӣҙжҺҘжӢјжҺҘ
      const url = `http://m.kuwo.cn/newh5/singles/songinfoandlrc?musicId=${songId}&httpStatus=1`;
      console.log('рҹ“Ў иҜ·жұӮжӯҢиҜҚ URL:', url);
      try {
        const response = await fetch(getProxyUrl(url));
        const res = await response.json();
        console.log('рҹ“Ұ жӯҢиҜҚе“Қеә”:', res);
        const rawList = res.data?.lrclist || [];
        if (rawList.length === 0) {
          console.warn('вҡ пёҸ жӯҢиҜҚеҲ—иЎЁдёәз©ә');
          return [];
        }
        return rawList.map(line => {
          let time = 0;
          if (typeof line.time === 'string' && line.time.includes(':')) {
            const parts = line.time.split(':');
            if (parts.length === 2) {
              time = parseInt(parts[0]) * 60 + parseFloat(parts[1]);
            }
          } else {
            time = parseFloat(line.time) || 0;
          }
          return {
            time: time,
            text: decodeHTML(line.lineLyric || '')
          };
        }).filter(item => item.text);
      } catch(e) {
        console.error('вқҢ еҠ иҪҪжӯҢиҜҚеҮәй”ҷ:', e);
        return [];
      }
    }

    // ========== гҖҗж ёеҝғдҝ®еӨҚгҖ‘й«ҳжё…е°Ғйқў - зӣҙжҺҘдј зәҜж•°еӯ— ID ==========
    async function fetchHighResArtwork(songId) {
      const url = `http://m.kuwo.cn/newh5/singles/songinfoandlrc?musicId=${songId}&httpStatus=1`;
      try {
        const response = await fetch(getProxyUrl(url));
        const res = await response.json();
        const originalUrl = res.data?.songinfo?.pic;
        if (originalUrl) {
          const secureUrl = originalUrl.replace(/^http:/i, "https:");
          if (secureUrl.includes("starheads/")) return secureUrl.replace(/starheads\/\d+/, "starheads/800");
          if (secureUrl.includes("albumcover/")) return secureUrl.replace(/albumcover\/\d+/, "albumcover/800");
          return secureUrl;
        }
        return null;
      } catch(e) { return null; }
    }

    // ========== жёІжҹ“ ==========
    async function triggerSearch() {
      const query = searchInput.value.trim();
      if (!query) return;
      currentQuery = query;
      currentPage = 1;
      await loadSearchList();
    }

    async function loadSearchList() {
      musicList.innerHTML = '<div class="text-center text-slate-400 py-12 text-xs">рҹ”Қ жӯЈеңЁжҗңеҜ»...</div>';
      try {
        const result = await searchMusic(currentQuery, currentPage);
        playlist = result.data;
        currentView = 'search';
        currentIndex = currentSongId ? playlist.findIndex(song => String(song.id) === String(currentSongId)) : -1;
        listTitle.innerText = 'жӯҢжӣІеҲ—иЎЁ';

        renderPlaylist();
        pageIndicator.innerText = `з¬¬ ${currentPage} йЎө`;
        pagination.classList.remove('hidden');

        prevPageBtn.className = currentPage === 1 ? "text-[11px] px-2.5 py-1 bg-slate-800 text-slate-600 rounded-lg cursor-not-allowed" : "text-[11px] px-2.5 py-1 bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition";
      } catch(err) {
        musicList.innerHTML = `<div class="text-center text-red-400 py-8 px-4 text-xs">еҠ иҪҪеӨұиҙҘпјҢиҜ·жЈҖжҹҘд»ЈзҗҶ</div>`;
        console.error(err);
      }
    }

    function renderPlaylist() {
      if (!playlist.length) {
        musicList.innerHTML = currentView === 'favorites'
          ? '<div class="text-center text-slate-500 py-12 text-xs">иҝҳжІЎжңүж”¶и—ҸжӯҢжӣІпјҢжҗңзҙўеҗҺзӮ№зҲұеҝғеҚіеҸҜж”¶и—Ҹ вқӨпёҸ</div>'
          : currentView === 'custom'
            ? '<div class="text-center text-slate-500 py-12 text-xs">иҝҷдёӘжӯҢеҚ•иҝҳжІЎжңүжӯҢжӣІпјҢжҗңзҙўеҗҺзӮ№еҮ»пјӢеҠ е…Ҙ</div>'
            : '<div class="text-center text-slate-500 py-12 text-xs">жІЎжңүжүҫеҲ°зӣёе…ійҹід№җ рҹҳӯ</div>';
        return;
      }
      musicList.innerHTML = playlist.map((song, idx) => {
        const isActive = String(currentSongId) === String(song.id);
        const liked = isFavorite(song.id);
        return `
          <div data-index="${idx}" class="flex items-center justify-between p-2.5 cursor-pointer transition ${isActive ? 'bg-brand-600/15 border-l-4 border-brand-500' : 'hover:bg-slate-800/40'}">
            <div class="flex items-center space-x-2.5 min-w-0 flex-1">
              <img src="${song.artwork || DEFAULT_COVER}" class="w-8 h-8 rounded object-cover bg-slate-800 shrink-0" onerror="this.src='${DEFAULT_COVER}'">
              <div class="min-w-0 flex-1">
                <p class="text-xs font-semibold truncate ${isActive ? 'text-brand-400' : 'text-slate-100'}">${song.title}</p>
                <p class="text-[10px] text-slate-400 truncate">${song.artist} - ${song.album || 'жңӘзҹҘдё“иҫ‘'}</p>
              </div>
            </div>
            <div class="flex items-center gap-2 shrink-0 ml-2">
              <button data-add-playlist-index="${idx}" class="p-1.5 rounded-full hover:bg-slate-800 text-slate-500 hover:text-brand-400" title="еҠ е…ҘжӯҢеҚ•">пјӢ</button>
              ${currentView === 'custom' ? `<button data-remove-playlist-index="${idx}" class="p-1.5 rounded-full hover:bg-slate-800 text-red-400" title="д»ҺжӯҢеҚ•з§»йҷӨ">вң•</button>` : ''}
              <button data-favorite-index="${idx}" class="p-1.5 rounded-full hover:bg-slate-800 transition ${liked ? 'text-pink-500' : 'text-slate-500 hover:text-pink-400'}" title="${liked ? 'еҸ–ж¶Ҳж”¶и—Ҹ' : 'ж”¶и—Ҹ'}">
                <svg class="w-4 h-4" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z"/></svg>
              </button>
              <span class="text-[10px] text-slate-500">зӮ№еҮ»ж’ӯж”ҫ</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderLyrics() {
      if (!lyricsContainer) return;
      if (!lyrics || lyrics.length === 0) {
        lyricsContainer.innerHTML = '<div class="text-center text-slate-600 py-8 text-xs">жҡӮж— жӯҢиҜҚ</div>';
        return;
      }
      lyricsContainer.innerHTML = lyrics.map((line, idx) => `
        <div id="lyric-line-${idx}" data-time="${line.time}" class="lyric-line py-1 px-1.5 text-center text-xs md:text-sm text-slate-500 font-medium transition-all duration-200 cursor-pointer hover:text-white rounded">
          ${line.text}
        </div>
      `).join('');
    }

    // ========== ж’ӯж”ҫ ==========
    async function playSong(idx) {
      if (idx < 0 || idx >= playlist.length) return;
      currentIndex = idx;
      const song = playlist[currentIndex];
      currentSongId = song.id;
      renderPlaylist();

      playerTitle.innerText = song.title;
      playerArtist.innerText = song.artist;
      playerCover.src = song.artwork || DEFAULT_COVER;
      playerCover.onerror = function() { this.src = DEFAULT_COVER; };

      const QUALITY_MAP = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' };
      const apiLevel = QUALITY_MAP[qualitySelect.value] || 'standard';
      // ж’ӯж”ҫ URL з”ЁзәҜж•°еӯ— ID
      const playUrl = buildPlayUrl(song);
      audioPlayer.src = playUrl;
      audioPlayer.play().catch(err => console.log('зӯүеҫ…з”ЁжҲ·дәӨдә’', err));
      updatePlayButtonState(true);

      // дј зәҜж•°еӯ— ID
      fetchHighResArtwork(song.id).then(url => { if(url) { song.artwork = url; playerCover.src = url; } });

      // ====== еҠ иҪҪжӯҢиҜҚ ======
      lastActiveIdx = -1;
      miniLyricText.innerText = "вҸі жӯЈеңЁеҠ иҪҪжӯҢиҜҚ...";
      lyricsContainer.innerHTML = '<div class="text-center text-slate-500 py-8 text-xs">жӯЈеңЁеҠ иҪҪжӯҢиҜҚ...</div>';
      downloadLrcBtn.classList.add('hidden');
      lyrics = [];

      // дј зәҜж•°еӯ— ID
      const rawLyrics = await fetchLyrics(song.id);
      console.log('рҹҺө жӯҢиҜҚи§Јжһҗз»“жһң:', rawLyrics);

      if (rawLyrics && rawLyrics.length > 0) {
        lyrics = rawLyrics;
        renderLyrics();
        downloadLrcBtn.classList.remove('hidden');
        miniLyricText.innerText = `рҹҺө ${song.title} - ${song.artist}`;
        console.log('вң… жӯҢиҜҚеҠ иҪҪжҲҗеҠҹпјҢе…ұ', lyrics.length, 'иЎҢ');
      } else {
        lyricsContainer.innerHTML = '<div class="text-center text-slate-600 py-8 text-xs">жҡӮж— жӯҢиҜҚ</div>';
        miniLyricText.innerText = "рҹ”Ү жҡӮж— жӯҢиҜҚ";
        console.warn('вқҢ жӯҢиҜҚеҠ иҪҪеӨұиҙҘ');
      }
    }

    function updatePlayButtonState(isPlaying) {
      if (isPlaying) {
        playIcon.innerHTML = `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />`;
      } else {
        playIcon.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />`;
      }
    }

    // ========== дёӢиҪҪ ==========
    async function downloadCurrentSong() {
      if (currentIndex === -1) { alert('иҜ·е…Ҳж’ӯж”ҫдёҖйҰ–жӯҢжӣІ'); return; }
      const song = playlist[currentIndex];
      const QUALITY_MAP = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' };
      const apiLevel = QUALITY_MAP[qualitySelect.value] || 'standard';
      const playUrl = buildPlayUrl(song);
      const originalHTML = downloadSongBtn.innerHTML;
      downloadSongBtn.innerHTML = `<span class="animate-pulse">вҸі</span> дёӢиҪҪдёӯ...`;
      downloadSongBtn.disabled = true;
      try {
        const response = await fetch(getProxyUrl(playUrl));
        const blob = await response.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${song.title} - ${song.artist}.${apiLevel === 'lossless' ? 'flac' : 'mp3'}`;
        a.click();
        URL.revokeObjectURL(a.href);
      } catch(e) { alert('дёӢиҪҪеӨұиҙҘ'); }
      downloadSongBtn.innerHTML = originalHTML;
      downloadSongBtn.disabled = false;
    }

    function downloadLyrics() {
      if (lyrics.length === 0) { alert('жІЎжңүжӯҢиҜҚеҸҜдёӢиҪҪ'); return; }
      const song = playlist[currentIndex];
      let lrc = `[ti:${song.title}]\n[ar:${song.artist}]\n[al:${song.album || 'жңӘзҹҘ'}]\n`;
      lyrics.forEach(line => {
        const m = Math.floor(line.time / 60).toString().padStart(2, '0');
        const s = Math.floor(line.time % 60).toString().padStart(2, '0');
        const ms = Math.floor((line.time % 1) * 100).toString().padStart(2, '0');
        lrc += `[${m}:${s}.${ms}]${line.text}\n`;
      });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([lrc], { type: 'text/plain;charset=utf-8' }));
      a.download = `${song.title} - ${song.artist}.lrc`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ========== йҹійў‘дәӢд»¶ ==========
    audioPlayer.ontimeupdate = () => {
      const cur = audioPlayer.currentTime;
      const dur = audioPlayer.duration || 0;
      progressBar.style.width = `${(cur/dur)*100 || 0}%`;
      currentTimeEl.innerText = formatTime(cur);
      durationTimeEl.innerText = formatTime(dur);

      if (lyrics.length > 0) {
        let activeIdx = -1;
        for (let i = 0; i < lyrics.length; i++) {
          if (cur >= lyrics[i].time) activeIdx = i;
          else break;
        }
        if (activeIdx === -1) activeIdx = 0;
        if (activeIdx !== lastActiveIdx) {
          lastActiveIdx = activeIdx;
          const line = lyrics[activeIdx];
          miniLyricText.innerText = line.text ? `рҹҺӨ ${line.text}` : "рҹҺө ...";
          if (lyricsContainer) {
            document.querySelectorAll('.lyric-line').forEach((el, idx) => {
              if (idx === activeIdx) {
                el.className = 'lyric-line py-2 px-1.5 text-center text-sm md:text-base text-brand-400 font-extrabold transition-all duration-300 transform scale-105';
                const containerHeight = lyricsContainer.clientHeight;
                const lineOffsetTop = el.offsetTop;
                const lineHeight = el.clientHeight;
                lyricsContainer.scrollTo({ top: lineOffsetTop - containerHeight/2 + lineHeight/2, behavior: 'smooth' });
              } else {
                el.className = 'lyric-line py-1 px-1.5 text-center text-xs md:text-sm text-slate-500 font-medium transition-all duration-200 cursor-pointer hover:text-white rounded';
              }
            });
          }
        }
      }
    };

    function nextPlaybackIndex(direction = 1) {
      if (!playlist.length) return -1;
      if ((currentView === 'favorites' || currentView === 'custom') && collectionPlaybackMode === 'random' && playlist.length > 1) {
        let next; do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIndex); return next;
      }
      return direction > 0 ? (currentIndex < playlist.length - 1 ? currentIndex + 1 : 0) : (currentIndex > 0 ? currentIndex - 1 : playlist.length - 1);
    }
    audioPlayer.onended = () => { const idx = nextPlaybackIndex(1); if (idx >= 0) playSong(idx); };

    // ========== дәӢд»¶з»‘е®ҡ ==========
    searchBtn.onclick = triggerSearch;
    searchInput.onkeypress = e => { if(e.key === 'Enter') triggerSearch(); };
    musicList.addEventListener('click', async e => {
      const addBtn=e.target.closest('[data-add-playlist-index]');
      if(addBtn){e.stopPropagation();const idx=Number(addBtn.dataset.addPlaylistIndex);if(playlist[idx])await openAddToPlaylist(playlist[idx]);return;}
      const removeBtn=e.target.closest('[data-remove-playlist-index]');
      if(removeBtn){e.stopPropagation();const idx=Number(removeBtn.dataset.removePlaylistIndex);if(activeCustomPlaylist&&playlist[idx]&&confirm('д»ҺиҝҷдёӘжӯҢеҚ•з§»йҷӨжӯҢжӣІпјҹ')){await apiFetch(`/api/playlists/${encodeURIComponent(activeCustomPlaylist.id)}/songs/${encodeURIComponent(playlist[idx].id)}`,{method:'DELETE'});await showCustomPlaylist(activeCustomPlaylist.id);}return;}
      const favoriteBtn = e.target.closest('[data-favorite-index]');
      if (favoriteBtn) {
        e.stopPropagation();
        const idx = parseInt(favoriteBtn.dataset.favoriteIndex, 10);
        if (!Number.isNaN(idx) && playlist[idx]) toggleFavorite(playlist[idx]);
        return;
      }
      const row = e.target.closest('[data-index]');
      if (row) playSong(parseInt(row.dataset.index, 10));
    });
    prevPageBtn.onclick = async () => { if(currentPage > 1) { currentPage--; await loadSearchList(); } };
    nextPageBtn.onclick = async () => { currentPage++; await loadSearchList(); };
    playBtn.onclick = () => {
      if (audioPlayer.src) {
        if (audioPlayer.paused) { audioPlayer.play(); updatePlayButtonState(true); }
        else { audioPlayer.pause(); updatePlayButtonState(false); }
      }
    };
    prevBtn.onclick = () => { const idx=nextPlaybackIndex(-1); if(idx>=0) playSong(idx); };
    nextBtn.onclick = () => { const idx=nextPlaybackIndex(1); if(idx>=0) playSong(idx); };
    progressContainer.onclick = e => {
      if (!audioPlayer.duration) return;
      const rect = progressContainer.getBoundingClientRect();
      audioPlayer.currentTime = ((e.clientX - rect.left) / rect.width) * audioPlayer.duration;
    };
    lyricsContainer.onclick = e => {
      const line = e.target.closest('.lyric-line');
      if (line) { const t = parseFloat(line.dataset.time); if(!isNaN(t)) audioPlayer.currentTime = t; }
    };
    qualitySelect.onchange = () => { if(currentIndex !== -1) { const t = audioPlayer.currentTime; playSong(currentIndex).then(() => audioPlayer.currentTime = t); } };
    downloadSongBtn.onclick = downloadCurrentSong;
    downloadLrcBtn.onclick = downloadLyrics;
    favoritesViewBtn.onclick = showFavorites;
    backToSearchBtn.onclick = showSearchResults;

    let authMode = 'login';
    function openAuthModal() { authModal.classList.remove('hidden'); authError.classList.add('hidden'); }
    function updateAuthUI() { authBtn.textContent = currentUser ? `${currentUser.username} В· йҖҖеҮә` : 'зҷ»еҪ•'; }
    authBtn.onclick = async () => { if (currentUser) { await apiFetch('/api/auth/logout',{method:'POST',body:'{}'}); currentUser=null; favorites=[]; customPlaylists=[]; activeCustomPlaylist=null; musicSources=[]; selectedSource=null; updateAuthUI(); showSearchResults(); } else openAuthModal(); };
    closeAuthBtn.onclick = () => authModal.classList.add('hidden');
    authSwitchBtn.onclick = () => { authMode = authMode === 'login' ? 'register' : 'login'; authTitle.textContent = authMode==='login'?'зҷ»еҪ•':'жіЁеҶҢ'; authSubmitBtn.textContent=authTitle.textContent; authSwitchBtn.textContent=authMode==='login'?'жІЎжңүиҙҰжҲ·пјҹжіЁеҶҢ':'е·ІжңүиҙҰжҲ·пјҹзҷ»еҪ•'; };
    authSubmitBtn.onclick = async () => { try { authError.classList.add('hidden'); const data=await apiFetch(`/api/auth/${authMode}`,{method:'POST',body:JSON.stringify({username:authUsername.value.trim(),password:authPassword.value})}); currentUser=data.user; authModal.classList.add('hidden'); authPassword.value=''; updateAuthUI(); await Promise.all([loadFavorites(),loadSources(),loadCustomPlaylists()]); } catch(e){ authError.textContent=e.message; authError.classList.remove('hidden'); } };
    settingsBtn.onclick = async () => { proxyInput.value = localStorage.getItem('music_cors_proxy') || 'https://jsnzkpg4.pages.dev/'; settingsModal.classList.remove('hidden'); await loadSources(); };
    closeSettingsBtn.onclick = () => settingsModal.classList.add('hidden');
    saveProxyBtn.onclick = () => { const v=proxyInput.value.trim(); if(v)localStorage.setItem('music_cors_proxy',v); else localStorage.removeItem('music_cors_proxy'); alert('д»ЈзҗҶи®ҫзҪ®е·Ідҝқеӯҳ'); };
    addSourceBtn.onclick = async () => { if(!requireLogin())return; try{ await apiFetch('/api/sources',{method:'POST',body:JSON.stringify({name:sourceNameInput.value.trim(),url_template:sourceUrlInput.value.trim()})}); sourceNameInput.value=''; sourceUrlInput.value=''; await loadSources(); }catch(e){alert(e.message);} };
    sourceList.onclick = async e => { const select=e.target.closest('[data-select-source]'), del=e.target.closest('[data-delete-source]'), edit=e.target.closest('[data-edit-source]'); try { if(select){await apiFetch(`/api/sources/${select.dataset.selectSource}/select`,{method:'POST',body:'{}'}); await loadSources();} if(del&&!del.disabled&&confirm('еҲ йҷӨиҝҷдёӘйҹіжәҗпјҹ')){await apiFetch(`/api/sources/${del.dataset.deleteSource}`,{method:'DELETE'}); await loadSources();} if(edit){const src=musicSources.find(x=>String(x.id)===edit.dataset.editSource); const name=prompt('йҹіжәҗеҗҚз§°',src.name); if(name===null)return; const url=prompt('API URL жЁЎжқҝ',src.url_template); if(url===null)return; await apiFetch(`/api/sources/${src.id}`,{method:'PUT',body:JSON.stringify({name,url_template:url})}); await loadSources();} } catch(err){alert(err.message);} };
    playCollectionSequentialBtn.onclick = async () => { collectionPlaybackMode='sequential'; if(playlist.length) playSong(0); };
    playCollectionRandomBtn.onclick = async () => { collectionPlaybackMode='random'; if(playlist.length) playSong(Math.floor(Math.random()*playlist.length)); };
    clearCollectionBtn.onclick = async () => {
      if(currentView==='favorites'){if(!favorites.length||!confirm('зЎ®е®ҡжё…з©әе…ЁйғЁж”¶и—Ҹпјҹ'))return;await apiFetch('/api/favorites',{method:'DELETE'});await loadFavorites();await showFavorites();}
      else if(currentView==='custom'&&activeCustomPlaylist){if(!playlist.length||!confirm('зЎ®е®ҡжё…з©әиҝҷдёӘжӯҢеҚ•пјҹ'))return;await apiFetch(`/api/playlists/${encodeURIComponent(activeCustomPlaylist.id)}/songs`,{method:'DELETE'});await showCustomPlaylist(activeCustomPlaylist.id);}
    };
    playlistsViewBtn.onclick=openPlaylistManager; closePlaylistManagerBtn.onclick=()=>playlistManagerModal.classList.add('hidden'); closeAddToPlaylistBtn.onclick=()=>addToPlaylistModal.classList.add('hidden');
    createPlaylistBtn.onclick=async()=>{if(!requireLogin())return;try{await apiFetch('/api/playlists',{method:'POST',body:JSON.stringify({name:playlistNameInput.value.trim(),description:playlistDescriptionInput.value.trim()})});playlistNameInput.value='';playlistDescriptionInput.value='';await loadCustomPlaylists();renderPlaylistManager();}catch(e){alert(e.message);}};
    playlistManagerList.onclick=async e=>{const open=e.target.closest('[data-open-playlist]'),edit=e.target.closest('[data-edit-playlist]'),del=e.target.closest('[data-delete-playlist]');try{if(open)await showCustomPlaylist(open.dataset.openPlaylist);if(edit){const pl=customPlaylists.find(x=>x.id===edit.dataset.editPlaylist);const name=prompt('жӯҢеҚ•еҗҚз§°',pl.name);if(name===null)return;const description=prompt('жӯҢеҚ•з®Җд»Ӣ',pl.description||'');if(description===null)return;await apiFetch(`/api/playlists/${encodeURIComponent(pl.id)}`,{method:'PUT',body:JSON.stringify({name,description})});await loadCustomPlaylists();renderPlaylistManager();}if(del&&confirm('еҲ йҷӨжӯҢеҚ•еҸҠе…¶дёӯжӯҢжӣІпјҹ')){await apiFetch(`/api/playlists/${encodeURIComponent(del.dataset.deletePlaylist)}`,{method:'DELETE'});await loadCustomPlaylists();renderPlaylistManager();}}catch(err){alert(err.message);}};
    addToPlaylistList.onclick=async e=>{const btn=e.target.closest('[data-add-to-playlist]');if(!btn||!pendingPlaylistSong)return;try{await apiFetch(`/api/playlists/${encodeURIComponent(btn.dataset.addToPlaylist)}/songs`,{method:'POST',body:JSON.stringify(pendingPlaylistSong)});addToPlaylistModal.classList.add('hidden');pendingPlaylistSong=null;alert('е·ІеҠ е…ҘжӯҢеҚ•');}catch(err){alert(err.message);}};

    // ========== еҲқе§ӢеҢ– ==========
    async function initApp() {
      initTheme(); playerCover.src=DEFAULT_COVER; playerCover.onerror=function(){this.src=DEFAULT_COVER;};
      try { const data=await apiFetch('/api/auth/me'); currentUser=data.user; updateAuthUI(); if(currentUser) await Promise.all([loadFavorites(),loadSources(),loadCustomPlaylists()]); } catch(e){ console.warn(e); }
      console.log('рҹҺө иЈӨдҪ¬йҹід№җзҪ‘е·ІеҠ иҪҪ');
    }
    initApp();
  </script>
</body>
</html>
